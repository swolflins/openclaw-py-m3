name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  # ─────── 1) 静态 + 单元测试 ───────
  test:
    name: ruff + pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
          pip install pytest pytest-asyncio pytest-cov ruff fakeredis

      - name: Ruff
        run: ruff check openclaw/ tests/ examples/

      - name: Test with coverage gate (70% lines / 55% branches)
        run: pytest --cov-fail-under=70 --tb=short -q
        env:
          # 测试时不需要真 LLM key
          OPENAI_API_KEY: sk-test-not-used
          ANTHROPIC_API_KEY: sk-test-not-used

  # ─────── 2) Docker 镜像 build(只在 main 触发) ───────
  docker:
    name: docker build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          tags: |
            ghcr.io/${{ github.repository_owner }}/openclaw-py:dev
            ghcr.io/${{ github.repository_owner }}/openclaw-py:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Smoke (image runs /healthz)
        run: |
          docker run -d --rm --name openclaw-ci -p 18080:8080 \
            ghcr.io/${{ github.repository_owner }}/openclaw-py:dev
          sleep 8
          curl -fsS http://127.0.0.1:18080/healthz | tee /tmp/health.json
          test "$(jq -r .status /tmp/health.json)" = "ok"
          docker stop openclaw-ci

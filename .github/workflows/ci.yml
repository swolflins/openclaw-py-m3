name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  # ─────── 1) 静态 + 单元测试(ubuntu) ───────
  test:
    name: ruff + pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        # Phase 29 / L11 修复:加 Python 3.13(性能提升明显,TPYU/free-threaded 渐进成熟)
        # 3.13 在 chromadb / apscheduler 上 wheel 已就绪(2024-10 后)
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
          pip install pytest pytest-asyncio pytest-cov ruff fakeredis mypy types-requests

      - name: Ruff (Phase 30 / E6)
        # E6 修复:启用 B/S/ASYNC 等规则集,发现潜在问题。
        # 策略:ASYNC 错(防 async 内阻塞 IO)直接 fail;其他 violation
        # (S603 subprocess / B023 loop var / B904 raise-from) 先 warning
        # 收集为 PR 评论,逐步修。
        run: |
          set +e
          echo "===== ASYNC hard-fail ====="
          ruff check openclaw/ tests/ --select ASYNC --output-format=concise
          ASYNC_EXIT=$?
          echo "===== Full lint (soft) ====="
          ruff check openclaw/ tests/ --output-format=concise 2>&1 | tail -30
          FULL_EXIT=$?
          if [ $ASYNC_EXIT -ne 0 ]; then
            echo "::error::Ruff ASYNC 规则 hard-fail(防 async 内阻塞 IO)"
            exit $ASYNC_EXIT
          fi
          echo "::warning::Ruff 全量 lint 仍有 $FULL_EXIT 个 violation,见上 — 后续 PR 渐进修"
          exit 0

      - name: mypy (strict-ish)
        # ENG-3:静态类型检查;先做非阻塞,逐步收紧
        run: |
          mypy --version
          mypy openclaw/ --ignore-missing-imports --no-strict-optional --warn-unused-ignores \
            --warn-redundant-casts --no-incremental 2>&1 | tee /tmp/mypy.log
          # 只把 "error:" 算失败;目前先做软门禁(有 error 仍允许 merge,只警告)
          if grep -E "^error:" /tmp/mypy.log; then
            echo "::warning::mypy reported errors (see /tmp/mypy.log) — please address"
          fi

      - name: Test with coverage gate (70% lines / 55% branches)
        run: pytest --cov-fail-under=70 --tb=short -q
        env:
          # 测试时不需要真 LLM key
          OPENAI_API_KEY: sk-test-not-used
          ANTHROPIC_API_KEY: sk-test-not-used

  # ─────── 1c) Windows 兼容(临时,验证后回退到只跑 ubuntu) ───────
  # phase 19.2:临时加 windows-latest,跑 phase 19 的 shlex + shell_exec 测试,
  # 验证 Windows 路径解析修复 + 接受 list 模式。3-5 分钟。
  # 验证 OK 后可注释掉此 job 节省 CI 配额。
  test-windows:
    name: ruff + pytest (windows)
    runs-on: windows-latest
    timeout-minutes: 20
    # 只在主分支 push 跑(节省 PR 配额);PR 反馈靠 ubuntu
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
          pip install pytest pytest-asyncio pytest-cov ruff fakeredis

      - name: Ruff
        shell: pwsh
        run: ruff check openclaw/ tests/ examples/

      - name: Run phase 19 Windows tests + key regression
        # Windows runner 只跑关键测试(避免 chromadb / apscheduler 在 Windows 上下载慢)
        # 用 --no-cov 覆盖 pyproject.toml 里的 --cov-fail-under(此 job 目的是验证 Windows 路径,不是覆盖全代码)
        shell: pwsh
        run: |
          pytest --no-cov tests/test_phase19_windows_shell.py tests/test_phase4.py -v --tb=short
        env:
          OPENAI_API_KEY: sk-test-not-used
          ANTHROPIC_API_KEY: sk-test-not-used

  # ─────── 1b) 安全审计(只在 main + PR) ───────
  audit:
    name: pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      # ENG-3 续:扫描依赖已知漏洞
      # - 高危 / 严重 CVE → 硬失败(阻断 merge)
      # - 解析失败 / 网络问题 → 软失败(只 warning,避免误杀)
      - name: Run pip-audit
        id: pip-audit
        run: |
          set -u
          # 用 || AUDIT_EXIT=$? 捕获 pip-audit 退出码(0=无漏洞,非 0=有 CVE 或执行失败)
          pip-audit --strict --no-deps > /tmp/audit.log 2>&1 || AUDIT_EXIT=$?
          AUDIT_EXIT=${AUDIT_EXIT:-0}
          echo "audit_exit=$AUDIT_EXIT"
          # 退出码 0 = 无漏洞;非 0 = 有漏洞或出错
          if [ "$AUDIT_EXIT" -ne 0 ]; then
            echo "::group::pip-audit 报告"
            cat /tmp/audit.log
            echo "::endgroup::"
            if grep -qE "^ID " /tmp/audit.log; then
              echo "::error::pip-audit 发现依赖 CVE,见 /tmp/audit.log — 阻断 merge"
              exit 1
            else
              echo "::warning::pip-audit 执行失败(网络 / 解析),不阻断"
            fi
          fi

  # ─────── 2) Docker 镜像 build(只在 main 触发) ───────
  docker:
    name: docker build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 30
    # docker build 经常因为 GitHub Actions 共享 runner 资源紧张而 fail
    # (BUILD/runc 拉不下来,Buildx 启动超时等), 跟代码无关
    # 用 continue-on-error 软失败, 主分支不阻断, 但会标 yellow ⚠
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          tags: |
            ghcr.io/${{ github.repository_owner }}/openclaw-py:dev
            ghcr.io/${{ github.repository_owner }}/openclaw-py:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Smoke (image runs /healthz)
        run: |
          # H1 修复后,gateway 默认 fail-closed(无 token 拒绝启动)
          # smoke test 只验证 /healthz,用 OPENCLAW_GATEWAY_DEV=1 允许无 token 启动
          docker run -d --rm --name openclaw-ci -p 18080:8080 \
            -e OPENCLAW_GATEWAY_DEV=1 \
            -e OPENCLAW_LOG_LEVEL=DEBUG \
            ghcr.io/${{ github.repository_owner }}/openclaw-py:dev

          # 等待容器启动(最多 30 秒,每 2 秒探测一次)
          ok=false
          for i in $(seq 1 15); do
            sleep 2
            if curl -fsS http://127.0.0.1:18080/healthz > /tmp/health.json 2>/dev/null; then
              ok=true
              break
            fi
            echo "  attempt $i: not ready yet..."
            # 检查容器是否已退出
            if ! docker ps --filter name=openclaw-ci --filter status=running | grep -q openclaw-ci; then
              echo "❌ 容器已退出,docker logs:"
              docker logs openclaw-ci 2>&1 | tail -30
              exit 1
            fi
          done

          if [ "$ok" = false ]; then
            echo "❌ 30 秒内 /healthz 未就绪,docker logs:"
            docker logs openclaw-ci 2>&1 | tail -50
            exit 1
          fi

          cat /tmp/health.json
          test "$(jq -r .status /tmp/health.json)" = "ok"
          echo "✅ /healthz 返回 ok"
          docker stop openclaw-ci

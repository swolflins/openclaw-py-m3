name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  # ─────── 1) 静态 + 单元测试 ───────
  test:
    name: ruff + pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
          pip install pytest pytest-asyncio pytest-cov ruff fakeredis mypy types-requests

      - name: Ruff
        run: ruff check openclaw/ tests/ examples/

      - name: mypy (strict-ish)
        # ENG-3:静态类型检查;先做非阻塞,逐步收紧
        run: |
          mypy --version
          mypy openclaw/ --ignore-missing-imports --no-strict-optional --warn-unused-ignores \
            --warn-redundant-casts --no-incremental 2>&1 | tee /tmp/mypy.log
          # 只把 "error:" 算失败;目前先做软门禁(有 error 仍允许 merge,只警告)
          if grep -E "^error:" /tmp/mypy.log; then
            echo "::warning::mypy reported errors (see /tmp/mypy.log) — please address"
          fi

      - name: Test with coverage gate (70% lines / 55% branches)
        run: pytest --cov-fail-under=70 --tb=short -q
        env:
          # 测试时不需要真 LLM key
          OPENAI_API_KEY: sk-test-not-used
          ANTHROPIC_API_KEY: sk-test-not-used

  # ─────── 1b) 安全审计(只在 main + PR) ───────
  audit:
    name: pip-audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      # ENG-3 续:扫描依赖已知漏洞
      # - 高危 / 严重 CVE → 硬失败(阻断 merge)
      # - 解析失败 / 网络问题 → 软失败(只 warning,避免误杀)
      - name: Run pip-audit
        id: pip-audit
        run: |
          set -u
          # 用 || AUDIT_EXIT=$? 捕获 pip-audit 退出码(0=无漏洞,非 0=有 CVE 或执行失败)
          pip-audit --strict --no-deps > /tmp/audit.log 2>&1 || AUDIT_EXIT=$?
          AUDIT_EXIT=${AUDIT_EXIT:-0}
          echo "audit_exit=$AUDIT_EXIT"
          # 退出码 0 = 无漏洞;非 0 = 有漏洞或出错
          if [ "$AUDIT_EXIT" -ne 0 ]; then
            echo "::group::pip-audit 报告"
            cat /tmp/audit.log
            echo "::endgroup::"
            if grep -qE "^ID " /tmp/audit.log; then
              echo "::error::pip-audit 发现依赖 CVE,见 /tmp/audit.log — 阻断 merge"
              exit 1
            else
              echo "::warning::pip-audit 执行失败(网络 / 解析),不阻断"
            fi
          fi

  # ─────── 2) Docker 镜像 build(只在 main 触发) ───────
  docker:
    name: docker build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          tags: |
            ghcr.io/${{ github.repository_owner }}/openclaw-py:dev
            ghcr.io/${{ github.repository_owner }}/openclaw-py:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Smoke (image runs /healthz)
        run: |
          docker run -d --rm --name openclaw-ci -p 18080:8080 \
            ghcr.io/${{ github.repository_owner }}/openclaw-py:dev
          sleep 8
          curl -fsS http://127.0.0.1:18080/healthz | tee /tmp/health.json
          test "$(jq -r .status /tmp/health.json)" = "ok"
          docker stop openclaw-ci

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OpenClaw Gateway</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #181b22;
      --panel-2: #1f232c;
      --fg: #e6e8eb;
      --muted: #8a93a3;
      --accent: #4ea3ff;
      --user: #2a5db0;
      --agent: #1f232c;
      --border: #2a2f3a;
      --ok: #2ecc71;
      --warn: #f39c12;
      --err: #e74c3c;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font: 14px/1.5 -apple-system, "Segoe UI", "PingFang SC", sans-serif;
           background: var(--bg); color: var(--fg); height: 100vh; overflow: hidden; }
    .layout { display: grid; grid-template-columns: 240px 1fr; height: 100vh; }
    .sidebar { background: var(--panel); border-right: 1px solid var(--border);
               display: flex; flex-direction: column; }
    .brand { padding: 16px; font-weight: 600; border-bottom: 1px solid var(--border);
             display: flex; align-items: center; gap: 8px; }
    .brand .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ok); }
    .session-list { flex: 1; overflow-y: auto; padding: 8px; }
    .session-item { padding: 8px 10px; border-radius: 6px; cursor: pointer; color: var(--muted);
                    display: flex; align-items: center; gap: 8px; }
    .session-item:hover { background: var(--panel-2); color: var(--fg); }
    .session-item.active { background: var(--panel-2); color: var(--fg); }
    .session-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .session-item .del { opacity: 0; color: var(--err); }
    .session-item:hover .del { opacity: 1; cursor: pointer; }
    .new-session { padding: 8px; border-top: 1px solid var(--border); }
    .new-session button { width: 100%; background: var(--accent); color: white; border: 0;
                          padding: 8px; border-radius: 6px; cursor: pointer; font-weight: 600; }
    .main { display: flex; flex-direction: column; }
    .topbar { padding: 12px 16px; border-bottom: 1px solid var(--border);
              display: flex; align-items: center; gap: 12px; background: var(--panel); }
    .topbar .session-name { font-weight: 600; }
    .topbar .meta { color: var(--muted); font-size: 12px; }
    .topbar .spacer { flex: 1; }
    .topbar button { background: var(--panel-2); color: var(--fg); border: 1px solid var(--border);
                     padding: 6px 10px; border-radius: 4px; cursor: pointer; }
    .topbar button:hover { border-color: var(--accent); }
    .messages { flex: 1; overflow-y: auto; padding: 16px; }
    .msg { max-width: 800px; margin: 8px auto; padding: 10px 14px; border-radius: 10px;
           line-height: 1.6; word-wrap: break-word; }
    .msg.user { background: var(--user); margin-left: auto; }
    .msg.agent { background: var(--agent); border: 1px solid var(--border); }
    .msg.tool { background: #20242d; color: var(--muted); font-family: ui-monospace, monospace;
                font-size: 12px; }
    .msg .role { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .inputbar { padding: 12px 16px; border-top: 1px solid var(--border); background: var(--panel);
                display: flex; gap: 8px; }
    .inputbar textarea { flex: 1; resize: none; height: 44px; padding: 10px; border-radius: 6px;
                         border: 1px solid var(--border); background: var(--panel-2); color: var(--fg);
                         font: inherit; }
    .inputbar button { background: var(--accent); color: white; border: 0; padding: 0 16px;
                       border-radius: 6px; cursor: pointer; font-weight: 600; }
    .inputbar button:disabled { opacity: 0.5; cursor: not-allowed; }
    .drawer { position: fixed; right: 0; top: 0; bottom: 0; width: 420px; background: var(--panel);
              border-left: 1px solid var(--border); transform: translateX(100%); transition: transform .2s;
              display: flex; flex-direction: column; }
    .drawer.open { transform: translateX(0); }
    .drawer header { padding: 12px 16px; border-bottom: 1px solid var(--border);
                     display: flex; align-items: center; }
    .drawer header .title { font-weight: 600; flex: 1; }
    .drawer header button { background: transparent; border: 0; color: var(--fg);
                            font-size: 18px; cursor: pointer; }
    .drawer .body { flex: 1; overflow-y: auto; padding: 12px 16px; }
    .tool-card { border: 1px solid var(--border); border-radius: 6px; padding: 10px;
                 margin-bottom: 8px; }
    .tool-card .name { font-weight: 600; }
    .tool-card .cat { font-size: 11px; color: var(--muted); }
    .tool-card .desc { color: var(--muted); font-size: 12px; margin: 4px 0; }
    .tool-card .perm { font-size: 11px; padding: 1px 6px; border-radius: 3px;
                       background: var(--panel-2); }
    .tool-card .perm.NETWORK { background: #2c3e50; }
    .tool-card .perm.EXEC { background: #6e2c00; }
    .tool-card .perm.ADMIN { background: #7b1f1f; }
    .empty { color: var(--muted); text-align: center; padding: 40px; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--panel-2);
             padding: 10px 16px; border-radius: 6px; border: 1px solid var(--border);
             box-shadow: 0 4px 12px rgba(0,0,0,.4); }
    .toast.err { border-color: var(--err); }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand"><span class="dot" id="statusDot"></span> OpenClaw</div>
      <div class="session-list" id="sessionList"></div>
      <div class="new-session">
        <button id="newSessionBtn">+ 新会话</button>
      </div>
    </aside>
    <main class="main">
      <div class="topbar">
        <div class="session-name" id="topName">未选择会话</div>
        <div class="meta" id="topMeta"></div>
        <div class="spacer"></div>
        <button id="toggleTools">工具</button>
        <button id="toggleSkills">Skills</button>
        <button id="refresh">刷新</button>
      </div>
      <div class="messages" id="messages">
        <div class="empty">选个 session 开始对话,或者点 "+ 新会话"。</div>
      </div>
      <div class="inputbar">
        <textarea id="input" placeholder="发条消息给 Agent (Enter 发送,Shift+Enter 换行)"></textarea>
        <button id="sendBtn">发送</button>
      </div>
    </main>
  </div>
  <div class="drawer" id="drawer">
    <header>
      <div class="title" id="drawerTitle">工具</div>
      <button onclick="closeDrawer()">×</button>
    </header>
    <div class="body" id="drawerBody"></div>
  </div>
  <div class="toast" id="toast" style="display:none"></div>

  <script>
  const $ = (s) => document.querySelector(s);
  const messagesEl = $('#messages');
  const inputEl = $('#input');
  const sendBtn = $('#sendBtn');
  let currentSession = null;

  function toast(text, isErr) {
    const t = $('#toast');
    t.textContent = text;
    t.className = 'toast' + (isErr ? ' err' : '');
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2400);
  }

  async function api(path, opts) {
    const r = await fetch(path, Object.assign({ headers: {'Content-Type': 'application/json'} }, opts || {}));
    if (!r.ok) {
      const txt = await r.text();
      throw new Error('HTTP ' + r.status + ': ' + txt.slice(0, 200));
    }
    return r.json();
  }

  async function loadSessions() {
    try {
      const { sessions } = await api('/v1/sessions');
      const list = $('#sessionList');
      list.innerHTML = '';
      sessions.forEach(s => {
        const div = document.createElement('div');
        div.className = 'session-item' + (s === currentSession ? ' active' : '');
        div.innerHTML = '<div class="name">' + escapeHtml(s) + '</div><div class="del" title="清除">×</div>';
        div.onclick = (e) => {
          if (e.target.classList.contains('del')) { clearSession(s); return; }
          openSession(s);
        };
        list.appendChild(div);
      });
      if (sessions.length === 0) {
        list.innerHTML = '<div class="empty" style="padding:24px">还没有 session</div>';
      }
    } catch (e) { toast(String(e), true); }
  }

  async function openSession(sid) {
    currentSession = sid;
    await loadSessions();
    $('#topName').textContent = sid;
    try {
      const { messages } = await api('/v1/sessions/' + encodeURIComponent(sid) + '?k=50');
      renderMessages(messages);
      $('#topMeta').textContent = messages.length + ' 条消息';
    } catch (e) {
      renderMessages([]);
      $('#topMeta').textContent = '';
    }
  }

  function renderMessages(msgs) {
    messagesEl.innerHTML = '';
    if (!msgs || msgs.length === 0) {
      messagesEl.innerHTML = '<div class="empty">这个 session 还是空的。发条消息试试。</div>';
      return;
    }
    msgs.forEach(m => {
      const div = document.createElement('div');
      div.className = 'msg ' + (m.role === 'user' ? 'user' : (m.role === 'tool' ? 'tool' : 'agent'));
      const label = m.role || '?';
      const content = typeof m.content === 'string' ? m.content : JSON.stringify(m.content);
      div.innerHTML = '<div class="role">' + escapeHtml(label) + '</div><div>' + escapeHtml(content) + '</div>';
      messagesEl.appendChild(div);
    });
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  async function send() {
    if (!currentSession) { toast('先选/新建一个 session', true); return; }
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    sendBtn.disabled = true;
    // 先在 UI 上乐观展示 user 消息
    appendMessage({ role: 'user', content: text });
    try {
      const r = await api('/v1/chat', { method: 'POST', body: JSON.stringify({ session_id: currentSession, message: text }) });
      appendMessage({ role: 'assistant', content: r.content });
      (r.tool_calls || []).forEach(tc => appendMessage({ role: 'tool', content: tc.name + ' ' + JSON.stringify(tc.arguments || {}) }));
    } catch (e) {
      appendMessage({ role: 'tool', content: 'ERROR: ' + String(e) });
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  function appendMessage(m) {
    if (messagesEl.querySelector('.empty')) messagesEl.innerHTML = '';
    const div = document.createElement('div');
    div.className = 'msg ' + (m.role === 'user' ? 'user' : (m.role === 'tool' ? 'tool' : 'agent'));
    const label = m.role || '?';
    const content = typeof m.content === 'string' ? m.content : JSON.stringify(m.content);
    div.innerHTML = '<div class="role">' + escapeHtml(label) + '</div><div>' + escapeHtml(content) + '</div>';
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function clearSession(sid) {
    if (!confirm('确定清除 ' + sid + ' 的历史?')) return;
    try { await api('/v1/sessions/' + encodeURIComponent(sid), { method: 'DELETE' });
      if (sid === currentSession) { currentSession = null; messagesEl.innerHTML = '<div class="empty">已清除</div>'; }
      await loadSessions();
    } catch (e) { toast(String(e), true); }
  }

  async function newSession() {
    try {
      const r = await api('/v1/sessions', { method: 'POST', body: JSON.stringify({}) });
      await openSession(r.session_id);
    } catch (e) { toast(String(e), true); }
  }

  // 抽屉(工具)
  async function openTools() {
    const d = $('#drawer'); d.classList.add('open');
    $('#drawerTitle').textContent = '工具';
    try {
      const r = await api('/v1/tools');
      const body = $('#drawerBody');
      body.innerHTML = '';
      if (!r.tools || r.tools.length === 0) { body.innerHTML = '<div class="empty">没有可用工具</div>'; return; }
      r.tools.forEach(t => {
        const card = document.createElement('div');
        card.className = 'tool-card';
        const perm = (t.permission || '').toString();
        card.innerHTML = '<div class="name">' + escapeHtml(t.name) + ' <span class="cat">' + escapeHtml(t.category || '') + '</span> <span class="perm ' + perm + '">' + escapeHtml(perm) + '</span></div>'
          + '<div class="desc">' + escapeHtml(t.description || '') + '</div>';
        body.appendChild(card);
      });
    } catch (e) { toast(String(e), true); }
  }
  async function openSkills() {
    const d = $('#drawer'); d.classList.add('open');
    $('#drawerTitle').textContent = 'Skills';
    try {
      const r = await api('/v1/skills');
      const body = $('#drawerBody');
      body.innerHTML = '';
      if (!r.skills || r.skills.length === 0) { body.innerHTML = '<div class="empty">没有加载的 skill</div>'; return; }
      r.skills.forEach(s => {
        const card = document.createElement('div');
        card.className = 'tool-card';
        card.innerHTML = '<div class="name">' + escapeHtml(s.name) + ' <span class="cat">v' + escapeHtml(s.version || '?') + '</span></div>'
          + '<div class="desc">' + escapeHtml(s.description || '') + '</div>'
          + (s.triggers ? '<div class="cat">triggers: ' + escapeHtml((s.triggers || []).join(', ')) + '</div>' : '');
        body.appendChild(card);
      });
    } catch (e) { toast(String(e), true); }
  }
  function closeDrawer() { $('#drawer').classList.remove('open'); }

  // 绑定
  $('#newSessionBtn').onclick = newSession;
  $('#sendBtn').onclick = send;
  $('#toggleTools').onclick = openTools;
  $('#toggleSkills').onclick = openSkills;
  $('#refresh').onclick = loadSessions;
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  // 启动
  loadSessions();
  // 健康检查
  fetch('/healthz').then(r => r.ok ? $('#statusDot').style.background = 'var(--ok)' : null).catch(()=>{});
  </script>
</body>
</html>
